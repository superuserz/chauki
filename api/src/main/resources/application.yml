spring:
  application:
    name: chauki-api
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/chauki}
      auto-index-creation: true
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  compression:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

chauki:
  seed: ${CHAUKI_SEED:dev-only-do-not-use-in-production}
  daily-salt: ${CHAUKI_DAILY_SALT:dev-salt}
  launch-date: 2026-05-16
  word-list-version: ${CHAUKI_WORD_LIST_VERSION:v1}
  word-data-dir: ${CHAUKI_WORD_DATA_DIR:../data}
  cors:
    allowed-origins: ${CHAUKI_CORS_ORIGINS:http://localhost:5173}
  rate-limit:
    short-window-seconds: 60
    short-limit: 10
    long-window-seconds: 86400
    long-limit: 200

logging:
  level:
    root: INFO
    io.chauki: INFO
